name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: read

jobs:
  # ── Linux x86_64 + aarch64 ──────────────────────────────────────────
  linux:
    name: Wheels — Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Copy README and LICENSE for PyPI
        run: |
          cp README.md python/rusjango/README.md
          cp LICENSE python/rusjango/LICENSE

      - name: Build wheels (maturin-action)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          working-directory: python/rusjango
          args: --release --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: python/rusjango/dist

  # ── Windows x86_64 ──────────────────────────────────────────────────
  windows:
    name: Wheels — Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy README and LICENSE for PyPI
        shell: pwsh
        run: |
          Copy-Item README.md python/rusjango/README.md
          Copy-Item LICENSE python/rusjango/LICENSE

      - name: Build wheels (maturin-action)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python/rusjango
          args: --release --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: python/rusjango/dist

  # ── macOS x86_64 + aarch64 (Apple Silicon) ──────────────────────────
  macos:
    name: Wheels — macOS ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Copy README and LICENSE for PyPI
        run: |
          cp README.md python/rusjango/README.md
          cp LICENSE python/rusjango/LICENSE

      - name: Build wheels (maturin-action)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          working-directory: python/rusjango
          args: --release --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: python/rusjango/dist

  # ── Source distribution ─────────────────────────────────────────────
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy README and LICENSE for PyPI
        run: |
          cp README.md python/rusjango/README.md
          cp LICENSE python/rusjango/LICENSE

      - name: Build sdist (maturin-action)
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          working-directory: python/rusjango
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: python/rusjango/dist

  # ── Publish to PyPI ─────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, sdist]
    environment:
      name: pypi
      url: https://pypi.org/project/rusjango
    permissions:
      id-token: write # required for OIDC trusted publishing

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Show distribution files
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
