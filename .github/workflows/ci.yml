name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Python tests ────────────────────────────────────────────────────
  test:
    name: Test — Python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install maturin
        run: pip install "maturin>=1.7,<2"

      - name: Build and install Rust extension
        working-directory: python/rusjango
        run: maturin develop

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio "uvicorn[standard]>=0.32" "aiosqlite>=0.20"

      - name: Run tests
        working-directory: python/rusjango
        run: pytest tests/ -v

  # ── Rust lint ───────────────────────────────────────────────────────
  rust-lint:
    name: Rust — fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: cargo fmt — check formatting
        run: cargo fmt --all -- --check

      - name: cargo clippy — lint CLI
        # Lint only the CLI crate; rusjango-core uses PyO3 which needs a
        # Python interpreter at compile time — covered by the test matrix above.
        run: cargo clippy -p rusjango-cli -- -D warnings
