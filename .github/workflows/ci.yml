name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Python tests ─────────────────────────────────────────────────────
  # No Rust compilation needed here: the _core extension is optional
  # (graceful try/except in __init__.py). Rust correctness is verified
  # by the release workflow which builds wheels for every platform.
  test:
    name: Test — Python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio "uvicorn[standard]>=0.32" "aiosqlite>=0.20"

      - name: Run tests
        working-directory: python/rusjango
        env:
          PYTHONPATH: src
        run: python -m pytest tests/ -v

  # ── Rust checks ───────────────────────────────────────────────────────
  rust:
    name: Rust — fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: cargo fmt — check formatting
        run: cargo fmt --all -- --check

      - name: cargo clippy — CLI
        # Lint the CLI only; rusjango-core (PyO3) needs a Python interpreter
        # at compile time which is not available in this Rust-only job.
        # The extension is compiled and tested in the release workflow.
        run: cargo clippy -p rusjango-cli -- -D warnings
