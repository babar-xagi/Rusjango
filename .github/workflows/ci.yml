name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Python tests ──────────────────────────────────────────────────────
  # Uses PYTHONPATH (absolute) to expose the pure-Python rusjango package.
  # The _core Rust extension is optional (try/except in __init__.py) so
  # all 13 tests pass without any Rust compilation in this job.
  # Rust correctness is verified by the release workflow on every v* tag.
  test:
    name: Test — Python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest "pytest-asyncio>=0.24,<0.27" "uvicorn[standard]>=0.32" "aiosqlite>=0.20"

      - name: Run tests
        working-directory: python/rusjango
        env:
          # Absolute path so Python finds rusjango/src on all platforms
          PYTHONPATH: ${{ github.workspace }}/python/rusjango/src
        run: python -m pytest tests/ -v

  # ── Rust checks ───────────────────────────────────────────────────────
  rust:
    name: Rust — fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: cargo fmt — check formatting
        run: cargo fmt --all -- --check

      - name: cargo clippy — CLI
        # CLI only; rusjango-core (PyO3) needs a Python interpreter at
        # compile time which is not present in this Rust-only job.
        run: cargo clippy -p rusjango-cli -- -D warnings
