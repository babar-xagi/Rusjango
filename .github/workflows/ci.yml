name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Opt into Node.js 24 early — silences the Node 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Python tests ──────────────────────────────────────────────────────
  test:
    name: Test — Python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest "pytest-asyncio>=0.24" "uvicorn[standard]>=0.32" "aiosqlite>=0.20"

      - name: Run tests
        working-directory: python/rusjango
        env:
          PYTHONPATH: ${{ github.workspace }}/python/rusjango/src
        run: python -m pytest tests/ -v

  # ── Rust checks ───────────────────────────────────────────────────────
  rust:
    name: Rust — fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: cargo fmt — check formatting
        run: cargo fmt --all -- --check

      - name: cargo clippy — CLI
        run: cargo clippy -p rusjango-cli -- -D warnings
